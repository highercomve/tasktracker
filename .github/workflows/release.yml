name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.runs-on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux: native gcc on matching-arch runners (zig conflicts
                    # with the host glibc headers for CGO+GTK builds).
                    - target: linux-amd64
                      runs-on: ubuntu-latest
                      make: build-native
                      dist: dist/linux-amd64/tasktracker
                      asset: tasktracker-linux-amd64.tar.gz
                      gtk: true
                    - target: linux-arm64
                      runs-on: ubuntu-24.04-arm
                      make: build-native
                      dist: dist/linux-arm64/tasktracker
                      asset: tasktracker-linux-arm64.tar.gz
                      gtk: true

                    # Windows: cross-compile from Linux with zig (no host-header
                    # conflict; no native Windows toolchain needed).
                    - target: windows-amd64
                      runs-on: ubuntu-latest
                      make: build-windows-amd64
                      dist: dist/windows-amd64/tasktracker.exe
                      asset: tasktracker-windows-amd64.zip
                      zig: true
                    - target: windows-arm64
                      runs-on: ubuntu-latest
                      make: build-windows-arm64
                      dist: dist/windows-arm64/tasktracker.exe
                      asset: tasktracker-windows-arm64.zip
                      zig: true

                    # macOS: native clang on Intel and Apple Silicon runners.
                    - target: darwin-amd64
                      runs-on: macos-13
                      make: build-native
                      dist: dist/darwin-amd64/tasktracker
                      asset: tasktracker-darwin-amd64.tar.gz
                    - target: darwin-arm64
                      runs-on: macos-14
                      make: build-native
                      dist: dist/darwin-arm64/tasktracker
                      asset: tasktracker-darwin-arm64.tar.gz
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # full history + tags so `git describe` resolves VERSION

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Set up Zig
              if: matrix.zig
              uses: goto-bus-stop/setup-zig@v2
              with:
                  version: 0.15.2

            - name: Install Linux dependencies
              if: matrix.gtk
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev libgtk-3-dev

            - name: Build
              run: make ${{ matrix.make }}

            - name: Package
              shell: bash
              run: |
                  set -e
                  if [[ "${{ matrix.asset }}" == *.zip ]]; then
                      zip -j "${{ matrix.asset }}" "${{ matrix.dist }}"
                  else
                      tar -czf "${{ matrix.asset }}" -C "$(dirname "${{ matrix.dist }}")" "$(basename "${{ matrix.dist }}")"
                  fi

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.asset }}
                  path: ${{ matrix.asset }}
                  if-no-files-found: error

    release:
        name: Create Release
        needs: build
        if: ${{ !cancelled() }} # release whatever built, even if some targets failed
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/*
