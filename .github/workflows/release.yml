name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.runs-on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux: native gcc on matching-arch runners. Bare-binary
                    # .tar.xz — the exact name/format the in-app auto-updater
                    # expects (internal/updater/updater.go). DO NOT change these.
                    - target: linux-amd64
                      runs-on: ubuntu-latest
                      make: build-native
                      dist: dist/linux-amd64/tasktracker
                      asset: tasktracker-linux-amd64.tar.xz
                      pack: tarxz
                      gtk: true
                    - target: linux-arm64
                      runs-on: ubuntu-24.04-arm
                      make: build-native
                      dist: dist/linux-arm64/tasktracker
                      asset: tasktracker-linux-arm64.tar.xz
                      pack: tarxz
                      gtk: true

                    # Flatpak/sandbox builds: same native binary but with the
                    # `flatpak` tag so Fyne uses XDG Desktop Portals. Separate
                    # asset name (-flatpak) so the auto-updater never picks it.
                    - target: linux-amd64-flatpak
                      runs-on: ubuntu-latest
                      make: build-native
                      tags: flatpak
                      dist: dist/linux-amd64/tasktracker
                      asset: tasktracker-linux-amd64-flatpak.tar.xz
                      pack: tarxz
                      gtk: true
                    - target: linux-arm64-flatpak
                      runs-on: ubuntu-24.04-arm
                      make: build-native
                      tags: flatpak
                      dist: dist/linux-arm64/tasktracker
                      asset: tasktracker-linux-arm64-flatpak.tar.xz
                      pack: tarxz
                      gtk: true

                    # Windows: cross-compile from Linux with zig. Bare-exe .zip,
                    # also consumed by the auto-updater. Keep names/format.
                    - target: windows-amd64
                      runs-on: ubuntu-latest
                      make: build-windows-amd64
                      dist: dist/windows-amd64/tasktracker.exe
                      asset: tasktracker-windows-amd64.zip
                      pack: zip
                      zig: true
                    - target: windows-arm64
                      runs-on: ubuntu-latest
                      make: build-windows-arm64
                      dist: dist/windows-arm64/tasktracker.exe
                      asset: tasktracker-windows-arm64.zip
                      pack: zip
                      zig: true

                    # macOS: native build wrapped into a proper .app bundle via
                    # `fyne package`. Not auto-updated, so the format is free.
                    # arm64 (Apple Silicon) only for now.
                    - target: darwin-arm64
                      runs-on: macos-14
                      make: build-native
                      dist: dist/darwin-arm64/tasktracker
                      asset: tasktracker-darwin-arm64.zip
                      pack: app
                      fyne: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # full history + tags so `git describe` resolves VERSION

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.24"

            # Plain download instead of a setup-zig action: the only maintained
            # ones still run on Node 20. Windows jobs run on x86_64 Linux runners.
            - name: Set up Zig
              if: matrix.zig
              run: |
                  ZIG_VER=0.15.2
                  curl -fsSL "https://ziglang.org/download/${ZIG_VER}/zig-x86_64-linux-${ZIG_VER}.tar.xz" -o /tmp/zig.tar.xz
                  mkdir -p /tmp/zig
                  tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
                  echo "/tmp/zig" >> "$GITHUB_PATH"

            - name: Install Linux dependencies
              if: matrix.gtk
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev libgtk-3-dev

            - name: Install fyne tool
              if: matrix.fyne
              run: go install fyne.io/tools/cmd/fyne@latest

            - name: Build binary
              run: make ${{ matrix.make }} TAGS=${{ matrix.tags }}

            - name: Package
              shell: bash
              run: |
                  set -e
                  export PATH="$(go env GOPATH)/bin:$PATH"
                  case "${{ matrix.pack }}" in
                      tarxz)
                          # Bare binary at archive root (auto-updater matches on basename).
                          tar -cJf "${{ matrix.asset }}" -C "$(dirname "${{ matrix.dist }}")" "$(basename "${{ matrix.dist }}")"
                          ;;
                      zip)
                          zip -j "${{ matrix.asset }}" "${{ matrix.dist }}"
                          ;;
                      app)
                          # Wrap the version-stamped binary into a .app (fyne has no
                          # --ldflags, so we package the already-built executable).
                          fyne package --os darwin --executable "${{ matrix.dist }}" \
                              --name tasktracker --icon Icon.png \
                              --app-id com.highercomve.tasktracker \
                              --app-version "${GITHUB_REF_NAME#v}" \
                              --app-build "${{ github.run_number }}"
                          ditto -c -k --keepParent tasktracker.app "${{ matrix.asset }}"
                          ;;
                  esac

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.asset }}
                  path: ${{ matrix.asset }}
                  if-no-files-found: error

    release:
        name: Create Release
        needs: build
        if: ${{ !cancelled() }} # release whatever built, even if some targets failed
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  files: artifacts/*
